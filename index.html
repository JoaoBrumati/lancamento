<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Lançamento 01/06</title>

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <div class="tag">
      EM BREVE
    </div>

    <h1>
      ALGO <span>INCRÍVEL</span><br>
      ESTÁ CHEGANDO
    </h1>

    <p class="subtitle">
      Estamos preparando uma experiência moderna, elegante e única.
      O lançamento oficial acontece em 01/06.
    </p>

    <div class="launch-date">
      LANÇAMENTO • 01/06
    </div>

    <div class="countdown">

      <div class="time-box">
        <h2 id="days">00</h2>
        <p>DIAS</p>
      </div>

      <div class="time-box">
        <h2 id="hours">00</h2>
        <p>HORAS</p>
      </div>

      <div class="time-box">
        <h2 id="minutes">00</h2>
        <p>MINUTOS</p>
      </div>

      <div class="time-box">
        <h2 id="seconds">00</h2>
        <p>SEGUNDOS</p>
      </div>

    </div>

    <div class="footer-text">
      PREPARE-SE PARA O LANÇAMENTO
    </div>

  </div>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
